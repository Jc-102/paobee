<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Paobee</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

/* ============================================================
   PAOBEE — Bakery PWA  |  paobee.html
   ------------------------------------------------------------
   STRUCTURE:
   1. ROOT & RESET
   2. SPLASH SCREEN
   3. SCREENS & ANIMATIONS
   4. TOP BAR & NAV
   5. HOME (hero, stats, about, categories)
   6. SHOP (product cards, search)
   7. CART & CHECKOUT (items, summary, promo, payment, schedule)
   8. ORDER TRACKING (progress, history, ratings)
   9. LOYALTY / POINTS
  10. SETTINGS (profile, prefs, payment methods)
  11. MANAGER (orders, products, schedule, analytics)
  12. MODALS (product, edit, add, payment method)
  13. UTILITY
   ============================================================ */

/* ────────── ROOT & RESET ────────────────────────────────────── */

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#E8587A;
  --pl:#FDF0F3;
  --pm:#F9D4DF;
  --cream:#FAF7F4;
  --card:#fff;
  --text:#1a1a1a;
  --muted:#888;
  --border:#F0E8EC;
  --sub:#555;
  --ibg:#fff;
  --sbg:#FAF7F4
}
body.dark{
  --cream:#1a1118;
  --card:#251c22;
  --text:#f0e8ec;
  --muted:#a08898;
  --border:#3a2a35;
  --sub:#c0a8b8;
  --ibg:#2e2028;
  --sbg:#1a1118;
  --pl:#3a1528;
  --pm:#4a1f30
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--text);
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  overflow-x:hidden
}
.about-body{padding:18px}
.about-body h3{
  font-family:'Playfair Display',serif;
  font-size:18px;
  margin-bottom:8px;
  color:var(--text)
}
.about-body p{
  font-size:13px;
  color:var(--sub);
  line-height:1.8;
  margin-bottom:10px
}
.pcard-body{padding:10px 12px}
body.dark .bnav{background:rgba(26,17,24,0.97)}

/* ────────── SPLASH SCREEN ───────────────────────────────────── */

#splash{
  position:fixed;
  inset:0;
  background:var(--pink);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
  animation:splashOut 0.5s ease 2s forwards
}
.splash-logo{
  font-family:'Playfair Display',serif;
  font-size:48px;
  color:#fff;
  margin-bottom:6px
}
.splash-tag{
  font-size:13px;
  color:rgba(255,255,255,.8);
  letter-spacing:2px;
  text-transform:uppercase
}
.splash-dots{display:flex;gap:8px;margin-top:28px}
.splash-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:rgba(255,255,255,.4);
  animation:dp 1.2s ease infinite
}
.splash-dot:nth-child(2){animation-delay:.2s}
.splash-dot:nth-child(3){animation-delay:.4s}

/* ────────── SCREENS & ANIMATIONS ────────────────────────────── */

@keyframes splashOut{99%{visibility:visible}100%{opacity:0;visibility:hidden;pointer-events:none}}
@keyframes dp{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
.screen{display:none;padding-bottom:90px;min-height:100vh}
.screen.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ────────── TOP BAR & NAV ───────────────────────────────────── */

.topbar{
  background:var(--cream);
  padding:16px 20px 8px;
  position:sticky;
  top:0;
  z-index:10;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between
}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--pink)}
.cart-btn{
  background:var(--pink);
  color:#fff;
  border:none;
  border-radius:50px;
  padding:8px 14px;
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px
}
.cc{
  background:#fff;
  color:var(--pink);
  border-radius:50%;
  width:18px;
  height:18px;
  font-size:11px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center
}
.bnav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:430px;
  background:rgba(250,247,244,0.97);
  border-top:1px solid var(--border);
  display:flex;
  z-index:100;
  padding:8px 0 12px
}
.nav-item{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  cursor:pointer;
  padding:4px 0;
  position:relative
}
.nav-icon{font-size:20px;line-height:1}
.nav-lbl{font-size:10px;font-weight:500;color:var(--muted)}
.nav-item.active .nav-lbl{color:var(--pink)}
.nav-dot{
  width:4px;
  height:4px;
  border-radius:50%;
  background:var(--pink);
  margin-top:1px;
  opacity:0
}
.nav-item.active .nav-dot{opacity:1}
.nav-badge{
  position:absolute;
  top:2px;
  right:10px;
  background:var(--pink);
  color:#fff;
  border-radius:50%;
  width:16px;
  height:16px;
  font-size:9px;
  font-weight:700;
  display:none;
  align-items:center;
  justify-content:center
}
.nav-badge.show{display:flex}

/* ────────── HOME – HERO ─────────────────────────────────────── */

.hero-wrap{
  position:relative;
  margin:12px 16px;
  border-radius:24px;
  overflow:hidden;
  min-height:240px;
  display:flex;
  align-items:flex-end
}
.hero-bg{
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#F9D4DF,#FDE8F0);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:110px;
  opacity:.3
}
.hero-content{position:relative;padding:24px;width:100%}
.hero-tag{
  font-size:11px;
  font-weight:500;
  color:var(--pink);
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:8px
}
.hero-title{
  font-family:'Playfair Display',serif;
  font-size:30px;
  line-height:1.15;
  margin-bottom:10px;
  color:var(--text)
}
.hero-title em{color:var(--pink);font-style:italic}
.hero-sub{
  font-size:13px;
  color:var(--sub);
  line-height:1.6;
  max-width:240px;
  margin-bottom:20px
}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}

/* ────────── HOME – STATS STRIP ──────────────────────────────── */

.astrip{
  display:flex;
  margin:14px 16px 0;
  background:var(--card);
  border-radius:20px;
  border:1px solid var(--border);
  overflow:hidden
}
.astat{
  flex:1;
  padding:14px 12px;
  text-align:center;
  border-right:1px solid var(--border)
}
.astat:last-child{border-right:none}
.astat-num{
  font-family:'Playfair Display',serif;
  font-size:20px;
  color:var(--pink);
  font-weight:600
}
.astat-lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* ────────── HOME – ABOUT & CATS ─────────────────────────────── */

.about-card{
  margin:12px 16px;
  background:var(--card);
  border-radius:20px;
  border:1px solid var(--border);
  overflow:hidden
}
.about-img{
  width:100%;
  height:130px;
  background:linear-gradient(135deg,#F9D4DF,var(--pm));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:56px
}
.about-tags{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px
}
.about-tag{
  background:var(--pl);
  color:var(--pink);
  font-size:11px;
  font-weight:600;
  padding:5px 12px;
  border-radius:50px
}
.sec{padding:18px 16px 8px}
.sec-hdr{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:12px
}
.sec-title{font-family:'Playfair Display',serif;font-size:19px;color:var(--text)}
.sec-title em{color:var(--pink);font-style:italic}
.see-all{
  font-size:13px;
  color:var(--pink);
  cursor:pointer;
  font-weight:500
}
.cats{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding-bottom:4px;
  scrollbar-width:none
}
.cats::-webkit-scrollbar{display:none}
.cat{
  flex-shrink:0;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:9px 13px;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
  color:var(--text)
}
.cat.active{background:var(--pink);color:#fff;border-color:var(--pink)}

/* ────────── SHOP – PRODUCT CARDS ────────────────────────────── */

.pgrid{
  padding:4px 16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px
}
.pcard{
  background:var(--card);
  border-radius:20px;
  overflow:hidden;
  border:1px solid var(--border);
  cursor:pointer;
  position:relative
}
.pcard-img{
  width:100%;
  height:130px;
  background:var(--pm);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
  overflow:hidden;
  position:relative
}
.pcard-img img{width:100%;height:100%;object-fit:cover}
.sold-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.5);
  display:flex;
  align-items:center;
  justify-content:center
}
.sold-badge{
  background:#fff;
  color:#1a1a1a;
  font-size:11px;
  font-weight:700;
  padding:5px 12px;
  border-radius:50px
}
.low-badge{
  position:absolute;
  bottom:6px;
  left:6px;
  background:#FFF3CD;
  color:#7B4A00;
  font-size:10px;
  font-weight:700;
  padding:3px 8px;
  border-radius:50px
}
.pcard-cat{
  font-size:10px;
  font-weight:500;
  color:var(--pink);
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:3px
}
.pcard-name{
  font-family:'Playfair Display',serif;
  font-size:14px;
  font-weight:600;
  margin-bottom:3px;
  line-height:1.3;
  color:var(--text)
}
.star-mini{
  font-size:11px;
  color:var(--muted);
  margin-bottom:5px;
  display:block
}
.pcard-desc{
  font-size:11px;
  color:var(--muted);
  margin-bottom:8px;
  line-height:1.5;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden
}
.pcard-row{display:flex;align-items:center;justify-content:space-between}
.pcard-price{font-size:15px;font-weight:600;color:var(--pink)}
.add-btn{
  background:var(--pink);
  color:#fff;
  border:none;
  border-radius:50%;
  width:28px;
  height:28px;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center
}
.add-btn:disabled{background:var(--border);cursor:not-allowed}
.feat-badge{
  background:var(--pink);
  color:#fff;
  font-size:10px;
  font-weight:600;
  padding:3px 8px;
  border-radius:50px;
  display:inline-block;
  margin-bottom:4px
}

/* ────────── REORDER CARDS ───────────────────────────────────── */

.reorder-card{
  margin:0 16px 10px;
  background:var(--card);
  border-radius:16px;
  border:1px solid var(--border);
  padding:12px 14px;
  display:flex;
  align-items:center;
  gap:12px
}
.reorder-icon{
  width:44px;
  height:44px;
  border-radius:12px;
  background:var(--pm);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  flex-shrink:0;
  overflow:hidden
}
.reorder-icon img{width:100%;height:100%;object-fit:cover}
.reorder-btn{
  background:var(--pink);
  color:#fff;
  border:none;
  border-radius:10px;
  padding:8px 14px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  white-space:nowrap;
  margin-left:auto
}

/* ────────── SEARCH BAR ──────────────────────────────────────── */

.search-bar{padding:10px 16px}
.search-wrap{position:relative}
.search-inp{
  width:100%;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:11px 16px 11px 40px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  color:var(--text);
  outline:none
}
.search-ico{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  font-size:16px;
  pointer-events:none
}

/* ────────── CART & CART ITEMS ───────────────────────────────── */

.cart-empty{text-align:center;padding:60px 24px}
.cart-empty-icon{font-size:56px;margin-bottom:16px}
.cart-empty h3{
  font-family:'Playfair Display',serif;
  font-size:22px;
  margin-bottom:8px;
  color:var(--text)
}
.cart-empty p{color:var(--muted);font-size:14px;margin-bottom:24px}
.cart-items{padding:16px}
.cart-item{
  background:var(--card);
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  gap:12px;
  align-items:center;
  border:1px solid var(--border)
}
.ci-img{
  width:56px;
  height:56px;
  border-radius:12px;
  background:var(--pm);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  flex-shrink:0;
  overflow:hidden
}
.ci-img img{width:100%;height:100%;object-fit:cover}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{
  background:var(--pl);
  border:none;
  border-radius:8px;
  width:26px;
  height:26px;
  font-size:16px;
  cursor:pointer;
  color:var(--pink);
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center
}
.qty-num{
  font-size:14px;
  font-weight:600;
  min-width:16px;
  text-align:center;
  color:var(--text)
}

/* ────────── CHECKOUT ────────────────────────────────────────── */

.co-section{padding:16px}
.co-card{
  background:var(--card);
  border-radius:20px;
  border:1px solid var(--border);
  padding:18px;
  margin-bottom:12px
}
.co-card h3{
  font-family:'Playfair Display',serif;
  font-size:16px;
  color:var(--text);
  margin-bottom:14px
}
.fld{margin-bottom:13px}
.flbl{
  font-size:12px;
  font-weight:600;
  color:var(--muted);
  margin-bottom:5px;
  display:block;
  text-transform:uppercase;
  letter-spacing:.4px
}
.finp{
  width:100%;
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:11px 14px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  color:var(--text);
  outline:none;
  background:var(--ibg)
}
.finp:focus{border-color:var(--pink)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.del-opts{display:flex;gap:10px;margin-bottom:14px}
.del-opt{
  flex:1;
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:12px;
  cursor:pointer;
  text-align:center;
  background:var(--card)
}
.del-opt.active{border-color:var(--pink);background:var(--pl)}
.del-opt-icon{font-size:22px;margin-bottom:4px}
.del-opt-lbl{font-size:12px;font-weight:600;color:var(--text)}
.del-opt-sub{font-size:11px;color:var(--muted)}
.sum-card{
  background:var(--card);
  border-radius:20px;
  border:1px solid var(--border);
  padding:18px;
  margin-bottom:12px
}
.sum-row{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  margin-bottom:8px;
  color:var(--text)
}
.sum-row.total{
  font-weight:700;
  font-size:16px;
  border-top:1px solid var(--border);
  padding-top:12px;
  margin-top:4px
}
.place-btn{
  background:var(--pink);
  color:#fff;
  border:none;
  border-radius:16px;
  width:100%;
  padding:16px;
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  font-weight:600;
  cursor:pointer
}

/* ────────── PROMO & PAYMENT ─────────────────────────────────── */

.promo-row{display:flex;gap:8px;margin-bottom:10px}
.promo-inp{
  flex:1;
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:11px 14px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  color:var(--text);
  outline:none;
  background:var(--ibg)
}
.promo-btn{
  background:var(--pl);
  color:var(--pink);
  border:none;
  border-radius:12px;
  padding:11px 16px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  font-family:'DM Sans',sans-serif
}
.promo-ok{
  font-size:12px;
  color:#2E7D32;
  padding:6px 10px;
  background:#E8F5E9;
  border-radius:8px;
  margin-bottom:8px;
  font-weight:600
}
.promo-err{
  font-size:12px;
  color:#C0392B;
  padding:6px 10px;
  background:#FFF0F0;
  border-radius:8px;
  margin-bottom:8px;
  font-weight:600
}
.pay-opts{display:flex;flex-direction:column;gap:8px}
.pay-opt{
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:12px 14px;
  cursor:pointer;
  background:var(--card);
  display:flex;
  align-items:center;
  gap:10px
}
.pay-opt.active{border-color:var(--pink);background:var(--pl)}
.pay-opt-lbl{font-size:13px;font-weight:600;color:var(--text)}
.pay-opt-sub{font-size:11px;color:var(--muted)}
.pay-note{
  font-size:12px;
  color:var(--muted);
  background:var(--sbg);
  border-radius:10px;
  padding:10px 12px;
  margin-top:10px;
  line-height:1.6
}

/* ────────── SCHEDULING SLOTS ────────────────────────────────── */

.date-slots{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding-bottom:4px;
  scrollbar-width:none;
  margin-bottom:10px
}
.date-slots::-webkit-scrollbar{display:none}
.dslot{
  flex-shrink:0;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:10px 14px;
  text-align:center;
  cursor:pointer;
  min-width:64px
}
.dslot.active{background:var(--pink);border-color:var(--pink)}
.dslot.disabled{opacity:.4;cursor:not-allowed}
.dslot-day{
  font-size:11px;
  font-weight:500;
  color:var(--muted);
  margin-bottom:2px
}
.dslot.active .dslot-day,.dslot.active .dslot-num{color:#fff}
.dslot-num{font-size:18px;font-weight:700;color:var(--text)}
.tslots{display:flex;gap:8px;flex-wrap:wrap}
.tslot{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:8px 12px;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  color:var(--text)
}
.tslot.active{background:var(--pink);border-color:var(--pink);color:#fff}

/* ────────── LOYALTY / POINTS ────────────────────────────────── */

.lrb{
  background:linear-gradient(135deg,var(--pl),var(--card));
  border:1.5px solid var(--pm);
  border-radius:14px;
  padding:14px;
  margin-bottom:14px
}
.lrb-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px
}
.lrb-title{font-size:14px;font-weight:600;color:var(--text)}
.lrb-pts{font-size:13px;color:var(--pink);font-weight:600}
.tog-sw{
  position:relative;
  width:44px;
  height:26px;
  cursor:pointer;
  flex-shrink:0
}
.tog-sw input{opacity:0;width:0;height:0}
.tog-sl{
  position:absolute;
  inset:0;
  background:var(--border);
  border-radius:26px;
  transition:.3s
}

function goTo(s){
  document.querySelectorAll('.screen').forEach(function(x){x.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(x){x.classList.remove('active');});
  document.getElementById('screen-'+s).classList.add('active');
  var n=document.getElementById('nav-'+s);if(n)n.classList.add('active');
  if(s==='cart')renderCart('cart');
  else if(s==='shop')renderShop();
  else if(s==='manager')renderManager();
  else if(s==='home')renderHome();
  else if(s==='track'){renderTrackActive();renderTrackHistory();}
  else if(s==='settings')renderSettings();
  updateCounts();
}

/* ══════════════════════════════════════════════
   CART UTILITIES
   ══════════════════════════════════════════════ */
function cartTotal(){return Object.entries(cart).reduce(function(s,e){var p=products.find(function(x){return x.id==e[0];});return s+(p?p.price*e[1]:0);},0);}
function cartCount(){return Object.values(cart).reduce(function(s,q){return s+q;},0);}
function updateCounts(){var c=cartCount();['home','shop'].forEach(function(s){var el=document.getElementById('cc-'+s);if(el)el.textContent=c;});}
/* ── addToCart / openProduct ───────────────── */
function addToCart(id,btn){var p=products.find(function(x){return x.id===id;});if(!p||p.stock==='out')return;cart[id]=(cart[id]||0)+1;updateCounts();if(btn){btn.textContent='ok';btn.style.background='#2E7D32';setTimeout(function(){btn.textContent='+';btn.style.background='';},700);}}
function openProduct(id){
  var p=products.find(function(x){return x.id===id;});if(!p)return;
  var mi=document.getElementById('modal-img');mi.innerHTML='';
  if(p.photo){var img=document.createElement('img');img.src=p.photo;img.style.cssText='width:100%;height:100%;object-fit:cover';img.onerror=function(){mi.innerHTML='<span style="font-size:68px">'+p.icon+'</span>';};mi.appendChild(img);}
  else mi.innerHTML='<span style="font-size:68px">'+p.icon+'</span>';
  document.getElementById('modal-cat').textContent=p.cat;
  document.getElementById('modal-name').textContent=p.name;
  document.getElementById('modal-desc').textContent=p.desc;
  document.getElementById('modal-price').textContent='$'+p.price.toFixed(2);
  document.getElementById('modal-rating').innerHTML=p.ratings.length?'&#x2B50; '+p.avgRating.toFixed(1)+' ('+p.ratings.length+')':'';
  var ab=document.getElementById('modal-abox');var at=document.getElementById('modal-allergens');
  if(p.allergens&&p.allergens.length){ab.style.display='block';at.innerHTML=p.allergens.map(function(a){return '<span class="allergen-tag">'+a+'</span>';}).join('');}else ab.style.display='none';
  var btn=document.getElementById('modal-add-btn');
  btn.textContent=p.stock==='out'?t('sold_out'):t('add_to_cart');btn.style.background=p.stock==='out'?'var(--muted)':'';btn.disabled=p.stock==='out';
  btn.onclick=p.stock==='out'?null:function(){cart[p.id]=(cart[p.id]||0)+1;updateCounts();btn.textContent=t('added');btn.style.background='#2E7D32';setTimeout(function(){btn.textContent=t('add_to_cart');btn.style.background='';},900);};
  document.getElementById('modal-overlay').classList.add('open');
}

function getAvailDates(){
  var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var DT={Mon:t('mon'),Tue:t('tue'),Wed:t('wed'),Thu:t('thu'),Fri:t('fri'),Sat:t('sat'),Sun:t('sun')};
  var MN=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var today=new Date(),dates=[];
  for(var i=advDays;i<=advDays+6;i++){var d=new Date(today);d.setDate(today.getDate()+i);var dk=DAYS[d.getDay()];var sc=SCHED[dk];dates.push({dk:dk,day:DT[dk]||dk,num:d.getDate(),month:MN[d.getMonth()],avail:sc&&sc.on,open:sc?sc.open:'',close:sc?sc.close:''});}
  return dates;
}
function getTSlots(open,close){if(!open||!close)return[];var slots=[],h=parseInt(open),m=parseInt(open.split(':')[1])||0,eh=parseInt(close);while(h<eh){var ap=h<12?'AM':'PM';var dh=h%12||12;slots.push(dh+':'+(m<10?'0':'')+m+' '+ap);m+=60;if(m>=60){h+=Math.floor(m/60);m=m%60;}}return slots;}

    +'<div class="co-card" id="addr-c" style="display:none"><h3>&#x1F4CD; '+t('delivery')+'</h3><div class="fld"><input class="finp" id="co-addr" placeholder="'+t('address_ph')+'"></div></div>'
    +'<div class="co-card"><h3>'+t('your_info')+'</h3><div class="fld"><label class="flbl">'+t('name')+'</label><input class="finp" id="co-name" value="'+prof.name+'"></div><div class="frow"><div class="fld"><label class="flbl">'+t('phone')+'</label><input class="finp" id="co-phone" value="'+prof.phone+'"></div><div class="fld"><label class="flbl">'+t('email')+'</label><input class="finp" id="co-email" value="'+prof.email+'"></div></div><div class="fld"><label class="flbl">Notas</label><textarea class="finp" id="co-notes" rows="2" style="resize:none" placeholder="'+t('notes_ph')+'"></textarea></div></div>'

function selDate(el,ds,o,c){document.querySelectorAll('.dslot').forEach(function(d){d.classList.remove('active');});el.classList.add('active');window._sd=ds;var sl=getTSlots(o,c);var w=document.getElementById('tslots-w');if(w){w.innerHTML=sl.map(function(x,i){return '<div class="tslot'+(i===0?' active':'')+'" onclick="selTime(this,\''+x+'\')">'+x+'</div>';}).join('');if(sl[0])window._st=sl[0];}}

function placeOrder(){
  var name=(document.getElementById('co-name')||{}).value||'';var phone=(document.getElementById('co-phone')||{}).value||'';
  if(!name||!phone){alert('Por favor ingresa tu nombre y telefono.');return;}
  if(!window._sd){alert('Por favor selecciona una fecha.');return;}
  var mode=window._dm||'pickup';var del=mode==='delivery'?1.50:0;
  var disc=0;if(appliedPromo){if(appliedPromo.pct)disc=cartTotal()*appliedPromo.pct/100;if(appliedPromo.flat)disc=Math.min(appliedPromo.flat,cartTotal());}
  var pd=0;if(redeemPts&&loyalty.points>=50){pd=Math.floor(loyalty.points/10);loyalty.points-=pd*10;loyalty.history.unshift({type:'spend',desc:'Canjeado al pagar',sub:pd*10+' pts = $'+pd+' off',amount:-(pd*10)});}
  var total=Math.max(0,cartTotal()+del-disc-pd);var pe=Math.floor(total);
  var entries=Object.entries(cart).filter(function(e){return e[1]>0;});
  var items=entries.map(function(e){var p=products.find(function(x){return x.id==e[0];});return{id:parseInt(e[0]),name:p?p.name:'',qty:e[1],price:p?p.price:0,icon:p?p.icon:'&#x1F370;',photo:p?p.photo:'',rated:false};});
  var num=String(nextOrderNum).padStart(3,'0');nextOrderNum++;

  loyalty.history.unshift({type:'pending',desc:'Pedido #'+num+' pendiente',sub:'Se desbloquea 72hrs despues de entrega',amount:pe});
  cart={};updateCounts();appliedPromo=null;redeemPts=false;

function renderTrackActive(){

    +'<div class="prog-sec"><div class="prog-track"><div class="prog-bg"></div><div class="prog-fill" style="width:'+pct+'%"></div>'+dots+'</div><div class="prog-labels">'+labs+'</div></div>'
    +'<div class="status-msg"><div class="status-msg-icon">'+SICONS[active.status]+'</div><div class="status-msg-txt">'+t(active.status)+'</div></div>'
    +'<div class="ois"><div class="oi-title">'+t('your_items')+'</div>'+iH+'</div>'
    +'<div class="ot"><div style="display:flex;justify-content:space-between;font-weight:700;font-size:15px;color:var(--text)"><span>'+t('total')+'</span><span style="color:var(--pink)">$'+active.total.toFixed(2)+'</span></div></div>'

function renderTrackHistory(){
  var el=document.getElementById('tab-history-content');
  var hist=orders.filter(function(o){return o.status==='completed'||o.status==='cancelled';});
  if(!hist.length){el.innerHTML='<div class="empty-state"><div class="empty-state-icon">&#x1F550;</div><h3>'+t('no_history')+'</h3><p>'+t('no_history_sub')+'</p></div>';return;}
  el.innerHTML=hist.map(function(o){
    var fi=o.items[0];var iH=fi&&fi.photo?'<img src="'+fi.photo+'" style="width:100%;height:100%;object-fit:cover">':'<span style="font-size:18px">'+(fi?fi.icon:'&#x1F370;')+'</span>';
    var sum=o.items.map(function(i){return i.qty+'x '+i.name;}).join(', ');var exp=expandedH[o.num];
    var now=Date.now();var hrs=(now-(o.completedAt||0))/3600000;
    var canRate=o.status==='completed'&&o.completedAt&&hrs>=24&&o.items.some(function(i){return !i.rated;});
    var ptsReady=o.status==='completed'&&o.completedAt&&hrs>=72&&!o.ptsUnlocked;
    var badges=(canRate?'<span class="ptsb">&#x2B50; Calificar</span>':'')+(ptsReady?'<span class="ptsb" style="background:#E8F5E9;color:#2E7D32">+'+o.ptsEarned+' pts</span>':'');
    var rp=canRate?o.items.filter(function(i){return !i.rated;}).map(function(item){return '<div class="rating-prompt"><div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">'+t('rate_order')+': '+item.name+'</div><div style="font-size:12px;color:var(--muted);margin-bottom:4px">'+t('rate_sub')+'</div><div class="star-picker" id="sp-'+o.num+'-'+item.id+'"><span class="star-pick" onclick="pickStar(\''+o.num+'\','+item.id+',1)">&#x2B50;</span><span class="star-pick" onclick="pickStar(\''+o.num+'\','+item.id+',2)">&#x2B50;</span><span class="star-pick" onclick="pickStar(\''+o.num+'\','+item.id+',3)">&#x2B50;</span><span class="star-pick" onclick="pickStar(\''+o.num+'\','+item.id+',4)">&#x2B50;</span><span class="star-pick" onclick="pickStar(\''+o.num+'\','+item.id+',5)">&#x2B50;</span></div><button class="rate-submit" onclick="submitRating(\''+o.num+'\','+item.id+')">'+t('submit_btn')+'</button><button class="rate-skip" onclick="skipRating(\''+o.num+'\','+item.id+')">'+t('skip_btn')+'</button></div>';}).join(''):'';
    var ex=exp?'<div class="hcard-exp">'+rp+o.items.map(function(i){return '<div class="hcard-ei"><span>'+i.qty+'x '+i.name+(i.rated?' &#x2B50;':'')+'</span><span style="color:var(--pink)">$'+(i.price*i.qty).toFixed(2)+'</span></div>';}).join('')+'<div style="border-top:1px solid var(--border);margin-top:6px;padding-top:8px;display:flex;justify-content:space-between;font-weight:700;font-size:13px;color:var(--text)"><span>'+t('total')+'</span><span style="color:var(--pink)">$'+o.total.toFixed(2)+'</span></div>'+(o.ptsEarned?'<div style="margin-top:6px;font-size:12px;color:'+(o.ptsUnlocked?'#2E7D32':'var(--muted)')+'">&#x2B50; '+(o.ptsUnlocked?'+'+o.ptsEarned+' '+t('pts_unlock'):'Puntos disponibles 72hrs despues')+'</div>':'')+'<div style="margin-top:10px"><button style="width:100%;background:var(--pink);color:#fff;border:none;border-radius:10px;padding:10px;font-family:\'DM Sans\',sans-serif;font-size:13px;font-weight:600;cursor:pointer">'+t('reorder')+'</button></div></div>':'';
    return '<div class="hcard"><div class="hcard-h" onclick="togH(\''+o.num+'\')">'+'<div class="hcard-img">'+iH+'</div><div style="flex:1"><div class="hcard-top"><span class="hcard-num">Pedido #'+o.num+'</span><span class="hcard-price">$'+o.total.toFixed(2)+'</span></div><div class="hcard-items">'+sum+'</div><div class="hcard-meta"><span class="hcard-date">'+o.scheduledDate+'</span><span class="spill s-'+o.status+'">'+o.status+'</span>'+badges+'</div></div><div style="color:var(--muted);font-size:16px;margin-left:4px">'+(exp?'&#x25B2;':'&#x25BC;')+'</div></div>'+ex+'</div>';
  }).join('');
}
function togH(num){expandedH[num]=!expandedH[num];renderTrackHistory();}
function pickStar(on,iid,n){starSel[on+'-'+iid]=n;var c=document.getElementById('sp-'+on+'-'+iid);if(c)c.querySelectorAll('.star-pick').forEach(function(s,i){s.classList.toggle('lit',i<n);});}
function submitRating(on,iid){var n=starSel[on+'-'+iid];if(!n)return;var order=orders.find(function(o){return o.num===on;});if(!order)return;var item=order.items.find(function(i){return i.id===iid;});if(item)item.rated=true;var p=products.find(function(x){return x.id===iid;});if(p){p.ratings.push(n);p.avgRating=p.ratings.reduce(function(a,b){return a+b;},0)/p.ratings.length;}renderTrackHistory();}
function skipRating(on,iid){var order=orders.find(function(o){return o.num===on;});if(!order)return;var item=order.items.find(function(i){return i.id===iid;});if(item)item.rated=true;renderTrackHistory();}

function savProf() {
  prof.name  = document.getElementById('pn').value || prof.name;
  prof.phone = document.getElementById('pp').value || prof.phone;
  prof.email = document.getElementById('pe').value || prof.email;
  /* save to Supabase */
  if (currentUser) {
    sb.from('profiles').update({
      name:       prof.name,
      phone:      prof.phone,
      email:      prof.email,
      avatar_url: prof.avatar_url || null
    }).eq('id', currentUser.id).then(function(res) {
      if (res.error) { alert('Error guardando perfil.'); return; }

    renderSettings();

    var oh=orders.filter(function(o){return o.status!=='completed'&&o.status!=='cancelled';}).map(function(o){
      var si=STAGES.indexOf(o.status);
      var sbH=STAGES.map(function(s,i){var past=i<si,ac=i===si;return '<button class="stage-btn '+(past?'past':ac?'active':'')+'" onclick="setStage('+o.id+',\''+s+'\')"><span class="stage-icon-s">'+SICONS[s]+'</span>'+t(s)+'</button>';}).join('');
      return '<div class="ocm"><div class="oct"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:11px;font-weight:600;color:var(--pink);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">#'+o.num+'</div><div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px">'+o.name+'</div><div style="font-size:12px;color:var(--muted)">'+o.phone+' · '+(o.delivery==='delivery'?'&#x1F6F5;':'&#x1F3E0;')+' · &#x1F4C5; '+o.scheduledDate+' '+o.scheduledTime+'</div><div style="font-size:12px;color:var(--muted);margin-top:3px">'+o.items.map(function(i){return i.qty+'x '+i.name;}).join(', ')+'</div>'+(o.notes?'<div style="font-size:12px;color:var(--pink);margin-top:2px">&#x1F4DD; '+o.notes+'</div>':'')+'</div><div style="text-align:right"><div style="font-size:16px;font-weight:700;color:var(--pink)">$'+o.total.toFixed(2)+'</div><div style="font-size:11px;color:var(--muted)">'+o.payment+'</div></div></div></div><div class="stage-sec"><div class="stage-lbl">'+t('update_status')+'</div><div class="stages">'+sbH+'</div><button class="cancel-btn" onclick="cancelOrd('+o.id+')">'+t('cancel_order')+'</button></div></div>';
    }).join('');

/* ══════════════════════════════════════════════
   C. AUTH FUNCTIONS
   ══════════════════════════════════════════════ */

var authTab = 'login';    // 'login' | 'signup'
var authMethod = 'email'; // 'email' | 'phone'
var pendingPhone = '';

/* ── Switch login / signup tab ───────────────── */
function switchAuthTab(tab) {
  authTab = tab;
  document.getElementById('atab-login').classList.toggle('active', tab === 'login');
  document.getElementById('atab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('auth-msg').innerHTML = '';
  renderAuthForm();
}

/* ── Switch email / phone method ─────────────── */
function switchAuthMethod(m) {
  authMethod = m;
  document.getElementById('am-email').classList.toggle('active', m === 'email');
  document.getElementById('am-phone').classList.toggle('active', m === 'phone');
  renderAuthForm();
}

/* ── Draw the auth form ──────────────────────── */
function renderAuthForm() {
  var wrap = document.getElementById('auth-form-wrap');
  var isLogin = authTab === 'login';
  var label = isLogin ? 'Iniciar sesion' : 'Crear cuenta';
  var fields = '';

  if (isLogin) {
    /* login: toggle between email or phone */
    fields += '<div class="auth-method">'
      + '<button class="auth-method-btn' + (authMethod === 'email' ? ' active' : '') + '" id="am-email" onclick="switchAuthMethod(\'email\')">&#x2709; Email</button>'
      + '<button class="auth-method-btn' + (authMethod === 'phone' ? ' active' : '') + '" id="am-phone" onclick="switchAuthMethod(\'phone\')">&#x1F4F1; Telefono</button>'
      + '</div>';
    if (authMethod === 'email') {
      fields += '<div class="auth-fld"><label class="auth-lbl">Correo electronico</label><input class="auth-inp" id="auth-email" type="email" placeholder="tu@email.com"></div>';
      fields += '<div class="auth-fld"><label class="auth-lbl">Contrasena</label><input class="auth-inp" id="auth-pass" type="password" placeholder="Tu contrasena"></div>';
    } else {
      fields += '<div class="auth-fld"><label class="auth-lbl">Numero de telefono</label><input class="auth-inp" id="auth-phone" type="tel" placeholder="+1787XXXXXXX"></div>';
    }
  } else {
    /* signup: always collect name + email + phone + password */
    fields += '<div class="auth-fld"><label class="auth-lbl">Nombre completo</label><input class="auth-inp" id="auth-name" placeholder="Tu nombre completo"></div>';
    fields += '<div class="auth-fld"><label class="auth-lbl">Correo electronico</label><input class="auth-inp" id="auth-email" type="email" placeholder="tu@email.com"></div>';
    fields += '<div class="auth-fld"><label class="auth-lbl">Numero de telefono</label><input class="auth-inp" id="auth-phone" type="tel" placeholder="+1787XXXXXXX"></div>';
    fields += '<div class="auth-fld"><label class="auth-lbl">Contrasena</label><input class="auth-inp" id="auth-pass" type="password" placeholder="Minimo 6 caracteres"></div>';
    fields += '<div style="font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.6">&#x1F4F1; Tu numero se usara para actualizaciones de pedidos via WhatsApp.</div>';
  }

  wrap.innerHTML = fields + '<button class="auth-btn" id="auth-submit-btn" onclick="handleAuth()">' + label + '</button>';
}

/* ── Handle auth submit ──────────────────────── */
function handleAuth() {
  var btn = document.getElementById('auth-submit-btn');
  btn.disabled = true;
  btn.textContent = 'Un momento...';
  setAuthMsg('', '');

  var isLogin = authTab === 'login';

  if (isLogin) {
    /* LOGIN */
    if (authMethod === 'email') {
      var email = (document.getElementById('auth-email') || {}).value || '';
      var pass  = (document.getElementById('auth-pass')  || {}).value || '';
      if (!email || !pass) { setAuthMsg('Por favor completa todos los campos.', 'err'); resetBtn(btn); return; }
      sb.auth.signInWithPassword({ email: email, password: pass }).then(function(res) { handleAuthResult(res, ''); });
    } else {
      var phone = (document.getElementById('auth-phone') || {}).value || '';
      if (!phone) { setAuthMsg('Por favor ingresa tu numero de telefono.', 'err'); resetBtn(btn); return; }
      pendingPhone = phone;
      sb.auth.signInWithOtp({ phone: phone }).then(function(res) {
        if (res.error) { setAuthMsg(res.error.message, 'err'); resetBtn(btn); return; }
        renderOtpForm(phone, '');
      });
    }
  } else {
    /* SIGNUP — always email + phone + name + password */
    var name  = (document.getElementById('auth-name')  || {}).value || '';
    var email = (document.getElementById('auth-email') || {}).value || '';
    var phone = (document.getElementById('auth-phone') || {}).value || '';
    var pass  = (document.getElementById('auth-pass')  || {}).value || '';
    if (!name)  { setAuthMsg('Por favor ingresa tu nombre.',             'err'); resetBtn(btn); return; }
    if (!email) { setAuthMsg('Por favor ingresa tu correo electronico.', 'err'); resetBtn(btn); return; }
    if (!phone) { setAuthMsg('Por favor ingresa tu numero de telefono.', 'err'); resetBtn(btn); return; }
    if (!pass || pass.length < 6) { setAuthMsg('La contrasena debe tener al menos 6 caracteres.', 'err'); resetBtn(btn); return; }
    sb.auth.signUp({
      email: email,
      password: pass,
      options: { data: { full_name: name, phone: phone } }
    }).then(function(res) { handleAuthResult(res, name, phone); });
  }
}

function resetBtn(btn) {
  if (!btn) return;
  btn.disabled = false;
  btn.textContent = authTab === 'login' ? 'Iniciar sesion' : 'Crear cuenta';
}

/* ── OTP verification form ───────────────────── */
function renderOtpForm(phone, name) {
  var wrap = document.getElementById('auth-form-wrap');
  wrap.innerHTML = '<div style="text-align:center;margin-bottom:16px">'
    + '<div style="font-size:32px;margin-bottom:8px">&#x1F4F1;</div>'
    + '<div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px">Codigo enviado a</div>'
    + '<div style="font-size:13px;color:var(--muted)">' + phone + '</div>'
    + '</div>'
    + '<div class="otp-inputs">'
    + '<input class="otp-inp" id="otp0" maxlength="1" oninput="otpNext(this,1)" onkeydown="otpBack(event,this,null)">'
    + '<input class="otp-inp" id="otp1" maxlength="1" oninput="otpNext(this,2)" onkeydown="otpBack(event,this,0)">'
    + '<input class="otp-inp" id="otp2" maxlength="1" oninput="otpNext(this,3)" onkeydown="otpBack(event,this,1)">'
    + '<input class="otp-inp" id="otp3" maxlength="1" oninput="otpNext(this,4)" onkeydown="otpBack(event,this,2)">'
    + '<input class="otp-inp" id="otp4" maxlength="1" oninput="otpNext(this,5)" onkeydown="otpBack(event,this,3)">'
    + '<input class="otp-inp" id="otp5" maxlength="1" oninput="otpNext(this,null)" onkeydown="otpBack(event,this,4)">'
    + '</div>'
    + '<button class="auth-btn" onclick="verifyOtp(\'' + phone + '\',\'' + name + '\')">Verificar codigo</button>'
    + '<div style="text-align:center;margin-top:14px"><span style="font-size:13px;color:var(--pink);cursor:pointer;font-weight:600" onclick="renderAuthForm()">Cambiar numero</span></div>';
  document.getElementById('otp0').focus();
}

function otpNext(el, nextIdx) {
  if (el.value && nextIdx !== null) {
    var next = document.getElementById('otp' + nextIdx);
    if (next) next.focus();
  }
}
function otpBack(e, el, prevIdx) {
  if (e.key === 'Backspace' && !el.value && prevIdx !== null) {
    var prev = document.getElementById('otp' + prevIdx);
    if (prev) { prev.value = ''; prev.focus(); }
  }
}

function verifyOtp(phone, name) {
  var code = [0,1,2,3,4,5].map(function(i) { var el = document.getElementById('otp'+i); return el ? el.value : ''; }).join('');
  if (code.length < 6) { setAuthMsg('Ingresa los 6 digitos.', 'err'); return; }
  sb.auth.verifyOtp({ phone: phone, token: code, type: 'sms' }).then(function(res) { handleAuthResult(res, name); });
}

/* ── Handle auth result ──────────────────────── */
function handleAuthResult(res, name, phone) {
  if (res.error) {
    setAuthMsg(res.error.message, 'err');
    var btn = document.getElementById('auth-submit-btn');
    if (btn) { btn.disabled = false; btn.textContent = authTab === 'login' ? 'Iniciar sesion' : 'Crear cuenta'; }
    return;
  }
  var user = res.data.user;
  if (!user) {
    /* email confirmation pending - but we don't require it so this shouldn't happen */
    setAuthMsg('Cuenta creada! Por favor inicia sesion.', 'ok');
    switchAuthTab('login');
    return;
  }
  currentUser = user;
  /* build display name from args or metadata */
  var meta = user.user_metadata || {};
  var displayName = name || meta.full_name || user.email || user.phone || 'Usuario';
  var displayPhone = phone || meta.phone || user.phone || '';
  /* upsert profile with name + email + phone */
  sb.from('profiles').upsert({
    id: user.id,
    name: displayName,
    email: user.email || '',
    phone: displayPhone
  }, { onConflict: 'id' }).then(function() {
    loadUserRole(user.id, displayName);
  });
}

/* ── Load role from DB ───────────────────────── */
function loadUserRole(uid, displayName) {
  sb.from('profiles').select('*').eq('id', uid).single().then(function(res) {
    if (res.data) {
      currentRole      = res.data.role       || 'customer';
      prof.name        = res.data.name       || displayName;
      prof.email       = res.data.email      || '';
      prof.phone       = res.data.phone      || '';
      prof.avatar_url  = res.data.avatar_url || '';
    } else {
      currentRole = 'customer';
      prof.name   = displayName;
    }
    onAuthSuccess();
  });
}

/* ── After successful login ──────────────────── */
function onAuthSuccess() {
  document.getElementById('auth-screen').style.display = 'none';
  /* show / hide manager tab based on role */
  var mgrNav = document.getElementById('nav-manager');
  if (mgrNav) mgrNav.style.display = currentRole === 'manager' ? '' : 'none';
  renderUserPill();
  loadProductsFromDB();
  loadOrdersFromDB();
  loadLoyaltyFromDB();
  applyTranslations();
  renderHome();
  updateCounts();
}

/* ── User pill (top right) ───────────────────── */
function renderUserPill() {
  var existing = document.getElementById('user-pill');
  if (existing) existing.remove();
  var initials = prof.name ? prof.name.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2) : '?';
  var avatarHtml = prof.avatar_url
    ? '<div class="user-pill-avatar" style="padding:0;overflow:hidden"><img src="' + prof.avatar_url + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div>'
    : '<div class="user-pill-avatar">' + initials + '</div>';
  var pill = document.createElement('div');
  pill.className = 'user-pill';
  pill.id = 'user-pill';
  pill.innerHTML = avatarHtml
    + '<div class="user-pill-name">' + prof.name + '</div>'
    + (currentRole === 'manager' ? '<div class="mgr-badge">MGR</div>' : '')
    + '<span style="font-size:10px;color:var(--muted);margin-left:2px">&#x25BC;</span>';
  pill.onclick = function() { goTo('settings'); };
  document.body.appendChild(pill);
}

/* ── Upload avatar to Supabase Storage ──────── */
function uploadAvatar(input) {
  var file = input.files[0];
  if (!file || !currentUser) return;

  /* compress before upload */
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      /* resize to max 400x400 */
      var canvas = document.createElement('canvas');
      var MAX = 400;
      var w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
      else        { if (h > MAX) { w = w * MAX / h; h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(function(blob) {
        var path = currentUser.id + '/avatar.jpg';
        /* show loading state */
        var avatarBtn = document.getElementById('s-avatar-btn');
        if (avatarBtn) avatarBtn.style.opacity = '0.5';
        sb.storage.from('avatars').upload(path, blob, { upsert: true, contentType: 'image/jpeg' })
          .then(function(res) {
            if (res.error) { alert('Error subiendo foto: ' + res.error.message); if (avatarBtn) avatarBtn.style.opacity = '1'; return; }
            /* get public URL */
            var urlRes = sb.storage.from('avatars').getPublicUrl(path);
            var publicUrl = urlRes.data.publicUrl + '?t=' + Date.now(); // cache bust
            prof.avatar_url = publicUrl;
            /* save url to profile */
            sb.from('profiles').update({ avatar_url: publicUrl }).eq('id', currentUser.id);
            /* re-render */
            renderSettings();
            renderUserPill();
          });
      }, 'image/jpeg', 0.8);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ── Sign out ────────────────────────────────── */
function signOut() {
  sb.auth.signOut().then(function() {
    currentUser = null; currentRole = 'customer';
    var pill = document.getElementById('user-pill'); if (pill) pill.remove();
    document.getElementById('auth-screen').style.display = 'flex';
    switchAuthTab('login');
    renderAuthForm();
  });
}

/* ── Auth message helper ─────────────────────── */
function setAuthMsg(msg, type) {
  var el = document.getElementById('auth-msg');
  if (!el) return;
  el.innerHTML = msg ? '<div class="auth-' + (type === 'err' ? 'err' : 'ok') + '">' + msg + '</div>' : '';
}

/* ══════════════════════════════════════════════
   D. SUPABASE DATA LOADERS
   ══════════════════════════════════════════════ */

function loadProductsFromDB() {
  sb.from('products').select('*').order('id').then(function(res) {
    if (res.data && res.data.length) {
      products = res.data.map(function(p) {
        return {
          id: p.id, name: p.name, cat: p.cat, desc: p.description,
          price: parseFloat(p.price), icon: p.icon || '&#x1F370;',
          photo: p.photo || '', featured: p.featured,
          allergens: p.allergens || [], stock: p.stock,
          ratings: p.ratings || [], avgRating: parseFloat(p.avg_rating) || 0
        };
      });
      if (document.getElementById('screen-home').classList.contains('active')) renderHome();
      if (document.getElementById('screen-shop').classList.contains('active')) renderShop();
    }
  });
}

function loadOrdersFromDB() {
  if (!currentUser) return;
  var query = currentRole === 'manager'
    ? sb.from('orders').select('*').order('id', { ascending: false })
    : sb.from('orders').select('*').eq('user_id', currentUser.id).order('id', { ascending: false });
  query.then(function(res) {
    if (res.data) {
      orders = res.data.map(function(o) {
        return {
          id: o.id, num: o.num, name: o.customer_name, phone: o.phone,
          email: o.email, address: o.address, notes: o.notes,
          delivery: o.delivery, total: parseFloat(o.total),
          status: o.status, date: o.scheduled_date,
          scheduledDate: o.scheduled_date, scheduledTime: o.scheduled_time,
          payment: o.payment, ptsEarned: o.pts_earned,
          ptsUnlocked: o.pts_unlocked, completedAt: o.completed_at,
          items: o.items || []
        };
      });
      var tb = document.getElementById('track-badge');
      var active = orders.find(function(o){return o.status!=='completed'&&o.status!=='cancelled';});
      if (tb) tb.classList.toggle('show', !!active);
    }
  });
}

function loadLoyaltyFromDB() {
  if (!currentUser) return;
  sb.from('loyalty').select('*').eq('user_id', currentUser.id).single().then(function(res) {
    if (res.data) {
      loyalty.points = res.data.points || 0;
      loyalty.history = res.data.history || [];
    }
  });
}

/* ── Save order to DB ────────────────────────── */
function saveOrderToDB(order) {
  return sb.from('orders').insert({
    num: order.num, user_id: currentUser ? currentUser.id : null,
    customer_name: order.name, phone: order.phone, email: order.email,
    address: order.address, notes: order.notes, delivery: order.delivery,
    total: order.total, status: order.status, payment: order.payment,
    scheduled_date: order.scheduledDate, scheduled_time: order.scheduledTime,
    pts_earned: order.ptsEarned, pts_unlocked: false,
    completed_at: null, items: order.items
  }).select().single();
}

/* ── Update order status in DB ───────────────── */
function updateOrderStatusDB(id, status) {
  var update = { status: status };
  if (status === 'completed') update.completed_at = Date.now();
  sb.from('orders').update(update).eq('id', id);
}

/* ── Save product to DB ──────────────────────── */
function saveProductToDB(p) {
  return sb.from('products').upsert({
    id: p.id > 1000 ? undefined : p.id,
    name: p.name, cat: p.cat, description: p.desc,
    price: p.price, icon: p.icon, photo: p.photo,
    featured: p.featured, stock: p.stock,
    allergens: p.allergens, avg_rating: p.avgRating, ratings: p.ratings
  }).select().single();
}

/* ── Update loyalty in DB ────────────────────── */
function saveLoyaltyToDB() {
  if (!currentUser) return;
  sb.from('loyalty').upsert({ user_id: currentUser.id, points: loyalty.points, history: loyalty.history }, { onConflict: 'user_id' });
}

/* ══════════════════════════════════════════════
   E. OVERRIDE placeOrder to save to DB
   ══════════════════════════════════════════════ */
var _origPlaceOrder = placeOrder;
placeOrder = function() {
  /* run the original logic to build the order object */
  var name=(document.getElementById('co-name')||{}).value||'';
  var phone=(document.getElementById('co-phone')||{}).value||'';
  if(!name||!phone){alert('Por favor ingresa tu nombre y telefono.');return;}
  if(!window._sd){alert('Por favor selecciona una fecha.');return;}
  var mode=window._dm||'pickup';var del=mode==='delivery'?1.50:0;
  var disc=0;if(appliedPromo){if(appliedPromo.pct)disc=cartTotal()*appliedPromo.pct/100;if(appliedPromo.flat)disc=Math.min(appliedPromo.flat,cartTotal());}
  var pd=0;if(redeemPts&&loyalty.points>=50){pd=Math.floor(loyalty.points/10);loyalty.points-=pd*10;}
  var total=Math.max(0,cartTotal()+del-disc-pd);var pe=Math.floor(total);
  var entries=Object.entries(cart).filter(function(e){return e[1]>0;});
  var items=entries.map(function(e){var p=products.find(function(x){return x.id==e[0];});return{id:parseInt(e[0]),name:p?p.name:'',qty:e[1],price:p?p.price:0,icon:p?p.icon:'&#x1F370;',photo:p?p.photo:'',rated:false};});
  var num=String(nextOrderNum).padStart(3,'0');nextOrderNum++;
  var newOrder={id:orders.length+1,num:num,name:name,phone:phone,email:(document.getElementById('co-email')||{}).value||'',address:(document.getElementById('co-addr')||{}).value||'',notes:(document.getElementById('co-notes')||{}).value||'',delivery:mode,total:total,status:'confirmed',date:'Hoy',scheduledDate:window._sd,scheduledTime:window._st,payment:window._pm||'cash',ptsEarned:pe,ptsUnlocked:false,completedAt:null,items:items};
  orders.unshift(newOrder);
  loyalty.history.unshift({type:'pending',desc:'Pedido #'+num+' pendiente',sub:'Se desbloquea 72hrs despues de entrega',amount:pe});
  /* save to Supabase */
  saveOrderToDB(newOrder).then(function(res){
    if(res.data) newOrder.id = res.data.id;
  });
  saveLoyaltyToDB();
  cart={};updateCounts();appliedPromo=null;redeemPts=false;
  document.getElementById('cart-title').textContent=t('order_placed');
  document.getElementById('cart-content').innerHTML='<div class="success-screen"><div class="success-icon">&#x1F389;</div><h2>'+t('order_placed')+'</h2><p>Gracias '+name+'!<br>'+window._sd+' a las '+window._st+'<br>&#x2B50; +'+pe+' pts ganados!</p><div class="order-pill">Pedido #'+num+'</div><br><button class="btn-pink" onclick="goTo(\'track\')">'+t('track_order')+'</button><br><br><button onclick="goTo(\'home\')" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:\'DM Sans\',sans-serif">'+t('back_home')+'</button></div>';
  document.getElementById('track-badge').classList.add('show');
};

/* ── Override setStage to save to DB ─────────── */
var _origSetStage = setStage;
setStage = function(id, stage) {
  _origSetStage(id, stage);
  updateOrderStatusDB(id, stage);
  if (stage === 'completed') {
    /* unlock loyalty points */
    var o = orders.find(function(x){return x.id===id;});
    if (o && !o.ptsUnlocked) {
      loyalty.points += o.ptsEarned;
      loyalty.history.unshift({type:'earn',desc:'Pedido #'+o.num+' completado',sub:'Puntos desbloqueados',amount:o.ptsEarned});
      o.ptsUnlocked = true;
      sb.from('orders').update({pts_unlocked: true}).eq('id', id);
      saveLoyaltyToDB();
    }
  }
};

/* ── Override saveNewProduct to save to DB ────── */
var _origSaveNew = saveNewProduct;
saveNewProduct = function() {
  var name=document.getElementById('add-name').value.trim();
  var price=parseFloat(document.getElementById('add-price').value);
  if(!name||!price){alert('Por favor ingresa nombre y precio.');return;}
  var cat=document.getElementById('add-cat').value;
  var newP={id:nextId++,name:name,cat:cat,desc:document.getElementById('add-desc').value||'Un delicioso postre.',price:price,icon:CE[cat]||'&#x1F370;',photo:document.getElementById('add-photo-data').value||'',featured:document.getElementById('add-featured').checked,allergens:document.getElementById('add-allergens').value.split(',').map(function(s){return s.trim();}).filter(Boolean),stock:'in',ratings:[],avgRating:0};
  products.push(newP);
  saveProductToDB(newP).then(function(res){if(res.data)newP.id=res.data.id;});
  document.getElementById('add-overlay').classList.remove('open');
  renderMgrTab('products');
  document.querySelectorAll('.mgr-tab').forEach(function(tb,i){tb.classList.toggle('active',i===1);});
};

/* ── Override saveEdit to save to DB ─────────── */
var _origSaveEdit = saveEdit;
saveEdit = function() {
  _origSaveEdit();
  var p = products.find(function(x){return x.id===editingId;});
  if (p) saveProductToDB(p);
};

/* ── Settings sign out button ────────────────── */
var _origRenderSettings = renderSettings;
renderSettings = function() {
  _origRenderSettings();
  /* inject sign out button at bottom of settings */
  var el = document.getElementById('settings-content');
  if (el) {
    var signOutDiv = document.createElement('div');
    signOutDiv.style.cssText = 'padding:0 16px 32px;';
    signOutDiv.innerHTML = '<button onclick="signOut()" style="width:100%;border:1.5px solid #C0392B;background:none;color:#C0392B;border-radius:14px;padding:14px;font-family:\'DM Sans\',sans-serif;font-size:14px;font-weight:600;cursor:pointer">Cerrar sesion</button>';
    el.appendChild(signOutDiv);
  }
};

/* ══════════════════════════════════════════════
   K. INIT
   ══════════════════════════════════════════════ */

/* Hide manager nav until role is confirmed */
(function() {
  var mgrNav = document.getElementById('nav-manager');
  if (mgrNav) mgrNav.style.display = 'none';
})();

/* Render auth form immediately */
renderAuthForm();

/* Listen for existing session (user already logged in) */
sb.auth.getSession().then(function(res) {
  var session = res.data && res.data.session;
  if (session && session.user) {
    currentUser = session.user;
    var meta = session.user.user_metadata || {};
    var displayName = meta.full_name || session.user.email || session.user.phone || 'Usuario';
    prof.name = displayName;
    loadUserRole(session.user.id, displayName);
  } else {
    /* no session — show auth screen */
    document.getElementById('auth-screen').style.display = 'flex';
  }
});

/* Listen for auth state changes (login/logout) */
sb.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_OUT') {
    document.getElementById('auth-screen').style.display = 'flex';
  }
});

applyTranslations();
renderPmForm();

</script>
